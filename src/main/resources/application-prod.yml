spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=${DB_SSL_MODE:require}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 0
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    validate-on-migrate: true
    clean-disabled: true

app:
  cors:
    allowed-origins: ${FRONTEND_URL},${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081},https://*.vercel.app
  email:
    require-verification: ${REQUIRE_EMAIL_VERIFICATION:true}
  onboarding:
    require-completion: ${REQUIRE_ONBOARDING_COMPLETION:true}
  reliability:
    outbox:
      enabled: ${OUTBOX_ENABLED:true}
      polling-ms: ${OUTBOX_POLLING_MS:300000}
    wompi-reconciliation:
      enabled: ${WOMPI_RECONCILIATION_ENABLED:true}
      polling-ms: ${WOMPI_RECONCILIATION_POLLING_MS:900000}
  sms:
    provider: ${SMS_PROVIDER:twilio}
    expose-debug-code: false
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:}
    private-key: ${FIREBASE_PRIVATE_KEY:}
    client-email: ${FIREBASE_CLIENT_EMAIL:}
    client-id: ${FIREBASE_CLIENT_ID:}
    private-key-id: ${FIREBASE_PRIVATE_KEY_ID:}
    credentials-base64: ${FIREBASE_CREDENTIALS_BASE64:}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [correlationId=%X{correlationId:-none}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.tecngo: INFO
    org.hibernate.SQL: WARN
    org.hibernate.stat: ${HIBERNATE_STAT_LOG_LEVEL:OFF}
