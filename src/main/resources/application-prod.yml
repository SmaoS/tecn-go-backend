spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=${DB_SSL_MODE:require}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 0
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    validate-on-migrate: true
    clean-disabled: true

app:
  cors:
    allowed-origins: ${FRONTEND_URL},${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081},https://*.vercel.app
  email:
    require-verification: ${REQUIRE_EMAIL_VERIFICATION:true}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.tecngo: INFO
    org.hibernate.SQL: WARN
