spring:
  application:
    name: tecngo-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:5MB}
      max-request-size: ${FILE_MAX_SIZE:5MB}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-change-me-now}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${FRONTEND_URL}
  admin:
    email: ${ADMIN_EMAIL:admin@tecngo.local}
    password: ${ADMIN_PASSWORD:Admin123!}
    sync-password: ${ADMIN_SYNC_PASSWORD:false}
  payments:
    platform-fee-percentage: ${PLATFORM_FEE_PERCENTAGE:10}
  files:
    max-size-bytes: ${FILE_MAX_SIZE_BYTES:5242880}
  email:
    provider: ${EMAIL_PROVIDER:resend}
    resend-api-key: ${RESEND_API_KEY:}
    from: ${EMAIL_FROM:TecnGo <onboarding@resend.dev>}
    verification-url: ${EMAIL_VERIFICATION_URL:${FRONTEND_URL}/verificar-correo}
    verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
    require-verification: ${REQUIRE_EMAIL_VERIFICATION:false}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:}
    private-key: ${FIREBASE_PRIVATE_KEY:}
    client-email: ${FIREBASE_CLIENT_EMAIL:}
    client-id: ${FIREBASE_CLIENT_ID:}
    private-key-id: ${FIREBASE_PRIVATE_KEY_ID:}
    credentials-base64: ${FIREBASE_CREDENTIALS_BASE64:}
  notifications:
    new-request-radius-km: ${NEW_REQUEST_NOTIFICATION_RADIUS_KM:25}
  parameters:
    quote-expiration-minutes: ${QUOTE_EXPIRATION_MINUTES:10}
    platform-commission-percentage: ${PLATFORM_COMMISSION_PERCENTAGE:10}
    technician-offline-after-minutes: ${TECHNICIAN_OFFLINE_AFTER_MINUTES:3}
    location-polling-seconds: ${LOCATION_POLLING_SECONDS:10}
    service-polling-seconds: ${SERVICE_POLLING_SECONDS:10}
    max-service-request-images: ${MAX_SERVICE_REQUEST_IMAGES:5}
    max-service-evidence-files: ${MAX_SERVICE_EVIDENCE_FILES:10}
    max-payment-proof-files: ${MAX_PAYMENT_PROOF_FILES:3}
    require-legal-acceptance: ${REQUIRE_LEGAL_ACCEPTANCE:true}
    require-profile-face-detection: ${REQUIRE_PROFILE_FACE_DETECTION:false}
    referral-program-enabled: ${REFERRAL_PROGRAM_ENABLED:true}
    referral-required-rating: ${REFERRAL_REQUIRED_RATING:5}
    referral-reward-expiration-days: ${REFERRAL_REWARD_EXPIRATION_DAYS:0}
    referral-reward-only-if-commission-gt-zero: ${REFERRAL_REWARD_ONLY_IF_COMMISSION_GT_ZERO:true}
    app-version-check-enabled: ${APP_VERSION_CHECK_ENABLED:true}

info:
  app:
    name: TecnGo
    version: 1.0.0
    environment: ${APP_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:unknown}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.tecngo: INFO
