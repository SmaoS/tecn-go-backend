spring:
  application:
    name: tecngo-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:5MB}
      max-request-size: ${FILE_MAX_SIZE:5MB}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-change-me-now}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${FRONTEND_URL}
  admin:
    email: ${ADMIN_EMAIL:admin@tecngo.local}
    password: ${ADMIN_PASSWORD:Admin123!}
    sync-password: ${ADMIN_SYNC_PASSWORD:false}
  payments:
    platform-fee-percentage: ${PLATFORM_FEE_PERCENTAGE:0}
  files:
    max-size-bytes: ${FILE_MAX_SIZE_BYTES:5242880}
  image-moderation:
    provider: ${IMAGE_MODERATION_PROVIDER:manual}
    cloudinary-mode: ${IMAGE_MODERATION_CLOUDINARY_MODE:aws_rek}
    require-managed-uploads: ${IMAGE_MODERATION_REQUIRE_MANAGED_UPLOADS:true}
  email:
    provider: ${EMAIL_PROVIDER:resend}
    resend-api-key: ${RESEND_API_KEY:}
    from: ${EMAIL_FROM:TecnGo <onboarding@resend.dev>}
    verification-url: ${EMAIL_VERIFICATION_URL:${FRONTEND_URL}/verificar-correo}
    verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
    require-verification: ${REQUIRE_EMAIL_VERIFICATION:false}
  onboarding:
    require-completion: ${REQUIRE_ONBOARDING_COMPLETION:false}
  security:
    admin-mfa-enabled: ${ADMIN_MFA_ENABLED:true}
    admin-mfa-expiration-minutes: ${ADMIN_MFA_EXPIRATION_MINUTES:10}
    require-persisted-sessions: ${REQUIRE_PERSISTED_SESSIONS:true}
  password-reset:
    expiration-minutes: ${PASSWORD_RESET_TOKEN_MINUTES:30}
    url: ${PASSWORD_RESET_URL:${FRONTEND_URL:http://localhost:5173}/reset-password}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:}
    private-key: ${FIREBASE_PRIVATE_KEY:}
    client-email: ${FIREBASE_CLIENT_EMAIL:}
    client-id: ${FIREBASE_CLIENT_ID:}
    private-key-id: ${FIREBASE_PRIVATE_KEY_ID:}
    credentials-base64: ${FIREBASE_CREDENTIALS_BASE64:}
  notifications:
    new-request-radius-km: ${NEW_REQUEST_NOTIFICATION_RADIUS_KM:25}
  sms:
    provider: ${SMS_PROVIDER:mock}
    mock-code: ${OTP_MOCK_CODE:00000}
    expose-debug-code: false
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}
  parameters:
    quote-expiration-minutes: ${QUOTE_EXPIRATION_MINUTES:10}
    platform-commission-percentage: ${PLATFORM_COMMISSION_PERCENTAGE:0}
    technician-offline-after-minutes: ${TECHNICIAN_OFFLINE_AFTER_MINUTES:3}
    location-polling-seconds: ${LOCATION_POLLING_SECONDS:10}
    service-polling-seconds: ${SERVICE_POLLING_SECONDS:10}
    max-service-request-images: ${MAX_SERVICE_REQUEST_IMAGES:5}
    max-service-evidence-files: ${MAX_SERVICE_EVIDENCE_FILES:10}
    max-payment-proof-files: ${MAX_PAYMENT_PROOF_FILES:3}
    require-legal-acceptance: ${REQUIRE_LEGAL_ACCEPTANCE:true}
    require-profile-face-detection: ${REQUIRE_PROFILE_FACE_DETECTION:false}
    referral-program-enabled: ${REFERRAL_PROGRAM_ENABLED:true}
    referral-required-rating: ${REFERRAL_REQUIRED_RATING:5}
    referral-reward-expiration-days: ${REFERRAL_REWARD_EXPIRATION_DAYS:0}
    referral-reward-only-if-commission-gt-zero: ${REFERRAL_REWARD_ONLY_IF_COMMISSION_GT_ZERO:true}
    app-version-check-enabled: ${APP_VERSION_CHECK_ENABLED:true}
    technician-recharge-enabled: ${TECHNICIAN_RECHARGE_ENABLED:false}
    technician-block-when-negative-balance: ${TECHNICIAN_BLOCK_WHEN_NEGATIVE_BALANCE:true}
    technician-low-balance-warning-enabled: ${TECHNICIAN_LOW_BALANCE_WARNING_ENABLED:false}
    technician-low-balance-minimum: ${TECHNICIAN_LOW_BALANCE_MINIMUM:10000}
    technician-min-recharge-amount: ${TECHNICIAN_MIN_RECHARGE_AMOUNT:10000}
    technician-max-recharge-amount: ${TECHNICIAN_MAX_RECHARGE_AMOUNT:500000}
    otp-expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
    otp-length: ${OTP_LENGTH:5}
    otp-max-attempts: ${OTP_MAX_ATTEMPTS:5}
    otp-max-sends-per-phone: ${OTP_MAX_SENDS_PER_PHONE:3}
    otp-max-sends-per-ip: ${OTP_MAX_SENDS_PER_IP:10}
    service-search-use-radius: ${SERVICE_SEARCH_USE_RADIUS:false}
    service-search-default-radius-km: ${SERVICE_SEARCH_DEFAULT_RADIUS_KM:10}
    service-search-max-radius-km: ${SERVICE_SEARCH_MAX_RADIUS_KM:50}
  wompi:
    public-key: ${WOMPI_PUBLIC_KEY:}
    private-key: ${WOMPI_PRIVATE_KEY:}
    events-secret: ${WOMPI_EVENTS_SECRET:}
    integrity-secret: ${WOMPI_INTEGRITY_SECRET:${WOMPI_EVENTS_SECRET:}}
    env: ${WOMPI_ENV:sandbox}
    frontend-url: ${FRONTEND_URL:http://localhost:5173}
    mobile-deep-link: ${MOBILE_DEEP_LINK:tecngo://payment-result}

info:
  app:
    name: TecnGo
    version: 1.0.0
    environment: ${APP_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:unknown}}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.tecngo: INFO
