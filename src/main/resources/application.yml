spring:
  application:
    name: tecngo-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:5MB}
      max-request-size: ${FILE_MAX_SIZE:5MB}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-change-me-now}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${FRONTEND_URL}
  admin:
    email: ${ADMIN_EMAIL:admin@tecngo.local}
    password: ${ADMIN_PASSWORD:Admin123!}
  payments:
    platform-fee-percentage: ${PLATFORM_FEE_PERCENTAGE:10}
  files:
    max-size-bytes: ${FILE_MAX_SIZE_BYTES:5242880}
  email:
    provider: ${EMAIL_PROVIDER:resend}
    resend-api-key: ${RESEND_API_KEY:}
    from: ${EMAIL_FROM:TecnGo <onboarding@resend.dev>}
    verification-url: ${EMAIL_VERIFICATION_URL:${FRONTEND_URL}/verificar-correo}
    verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
    require-verification: ${REQUIRE_EMAIL_VERIFICATION:false}

info:
  app:
    name: TecnGo
    version: 1.0.0
    environment: ${APP_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:unknown}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.tecngo: INFO
