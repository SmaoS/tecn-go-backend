spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:tecngo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
app:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-hmac
    expiration-ms: 3600000
  cors:
    allowed-origins: http://localhost:5173
  admin:
    email: admin@tecngo.local
    password: Admin123!
  payments:
    platform-fee-percentage: 10
  files:
    max-size-bytes: 5242880
  image-moderation:
    require-managed-uploads: false
  email:
    verification-url: http://localhost:5173/verificar-correo
    require-verification: false
  sms:
    provider: mock
    mock-code: "00000"
    expose-debug-code: true
